# Global variables for all environments
docker_compose_version: "2.21.0"
timezone: "UTC"

# Network configuration
shared_docker_network: "n8n-network"

# Common directories
base_dir: "/srv/www"
apps_dir: "{{ base_dir }}/n8n_{{ group_names[0] }}"
proxy_dir: "{{ base_dir }}/proxy"
backups_dir: "/mnt/data/backups/n8n_{{ group_names[0] }}"
# Hetzner volume path for DB and service data (must match N8N_DATA_PATH in .env on server)
n8n_data_path: "/mnt/data/n8n"

# Optional: force pull images and rebuild custom n8n on every deploy (default: false for fast deploys).
# Set to true when you've updated images or the n8n Dockerfile: -e force_pull_build=true
# force_pull_build: false

# Optional: one-time migration of Postgres from named volume to Hetzner path.
# Set when first switching to N8N_DATA_PATH to avoid losing DB:
#   -e migrate_postgres_to_hetzner=true -e postgres_old_volume_name=current_langfuse_postgres_data
# Find volume name on server: docker volume ls | grep postgres
# postgres_old_volume_name: "current_langfuse_postgres_data"

# Backup configuration
backup_retention_days: 30
backup_schedule: "0 2 * * *"  # Daily at 2 AM

# Security
firewall_allowed_ports:
  - "25222"    # SSH
  - "80"    # HTTP
  - "443"   # HTTPS
  - "19999" # Netdata

# Docker configuration
docker_users:
  - "kulibin"
  - "deploy"

# Proxy configuration
proxy_type: "caddy"  # Options: caddy, traefik, nginx

# Repository configuration
repo_url: "https://github.com/leemour/n8n_deploy_example"
git_branch: "main"
